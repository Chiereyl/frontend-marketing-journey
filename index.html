<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Czkiervan's - Order Now | Authentic Cebuano Meals</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom right, #fef3c7, #fee5e3, #fed7aa);
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: white;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      border-bottom: 4px solid #dc2626;
    }

    .header-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      flex: 1;
    }

    .logo h1 {
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      font-weight: 900;
      color: #b91c1c;
      letter-spacing: -1px;
      margin: 0;
    }

    .logo p {
      font-size: 0.625rem;
      color: #b45309;
      font-weight: 700;
      letter-spacing: 1px;
      margin-top: 2px;
      margin: 0;
    }

    .cart-btn {
      position: relative;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 9999px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 10px 15px rgba(220, 38, 38, 0.3);
    }

    .cart-btn:hover {
      background: #b91c1c;
      transform: scale(1.05);
    }

    .cart-btn:active {
      transform: scale(0.95);
    }

    .cart-badge {
      position: absolute;
      top: -0.5rem;
      right: -0.5rem;
      background: #fbbf24;
      color: #7c2d12;
      font-weight: 700;
      font-size: 0.75rem;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
    }

    /* Modal Overlays */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.active {
      display: flex;
      animation: fadeIn 0.3s ease-out;
    }

    @media (min-width: 768px) {
      .modal-overlay {
        align-items: center;
      }
    }

    /* Cart Modal */
    .cart-modal {
      background: white;
      border-radius: 1rem 1rem 0 0;
      width: 100%;
      max-width: 28rem;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.3s ease-out;
    }

    @media (min-width: 768px) {
      .cart-modal {
        border-radius: 1rem;
      }
    }

    .modal-header {
      position: sticky;
      top: 0;
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 1rem 1rem 0 0;
    }

    .modal-header h2 {
      font-size: 1.25rem;
      font-weight: 900;
      margin: 0;
    }

    .close-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: 0.2s;
    }

    .close-btn:hover {
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 0.5rem;
      transform: rotate(90deg);
    }

    .cart-empty {
      padding: 2rem 1rem;
      text-align: center;
      color: #6b7280;
    }

    .cart-items {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f9fafb;
      padding: 0.75rem;
      border-radius: 0.5rem;
      border-left: 4px solid #dc2626;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-weight: 700;
      color: #1f2937;
      font-size: 0.875rem;
    }

    .cart-item-price {
      color: #b45309;
      font-weight: 700;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .qty-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.25rem;
      transition: all 0.2s;
      font-weight: 700;
      width: 28px;
      height: 28px;
    }

    .qty-btn.minus {
      background: #fee2e2;
      color: #dc2626;
    }

    .qty-btn.minus:hover {
      background: #fecaca;
    }

    .qty-btn.plus {
      background: #dcfce7;
      color: #16a34a;
    }

    .qty-btn.plus:hover {
      background: #bbf7d0;
    }

    .qty-display {
      font-weight: 700;
      font-size: 1.125rem;
      width: 2rem;
      text-align: center;
    }

    .cart-footer {
      border-top: 2px solid #e5e7eb;
      padding: 1rem;
      background: #f9fafb;
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.125rem;
      font-weight: 900;
      color: #1f2937;
      margin-bottom: 0.75rem;
    }

    .cart-total-amount {
      color: #dc2626;
    }

    .checkout-btn {
      width: 100%;
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
      border: none;
      font-weight: 900;
      padding: 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 10px 15px rgba(220, 38, 38, 0.3);
    }

    .checkout-btn:hover {
      background: linear-gradient(135deg, #b91c1c, #991b1b);
      transform: scale(1.02);
    }

    /* Payment Modal */
    .payment-modal {
      background: white;
      border-radius: 1.5rem;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease-out;
    }

    .payment-header {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
      padding: 1.5rem;
      border-radius: 1.5rem 1.5rem 0 0;
      text-align: center;
    }

    .payment-header h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      margin: 0 0 0.5rem 0;
    }

    .payment-header p {
      font-size: 1.25rem;
      font-weight: 900;
      color: #fbbf24;
      margin: 0;
    }

    .payment-content {
      padding: 1.5rem;
    }

    .payment-methods {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 640px) {
      .payment-methods {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .payment-method-btn {
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 1rem;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }

    .payment-method-btn:hover {
      border-color: #dc2626;
      box-shadow: 0 10px 25px rgba(220, 38, 38, 0.2);
      transform: translateY(-4px);
    }

    .payment-method-btn.active {
      background: linear-gradient(135deg, #fef3c7, #fecaca);
      border-color: #dc2626;
      box-shadow: 0 10px 25px rgba(220, 38, 38, 0.3);
      transform: scale(1.02);
    }

    .payment-icon {
      font-size: 2rem;
    }

    .payment-label {
      font-weight: 700;
      font-size: 0.875rem;
      color: #1f2937;
    }

    .payment-details {
      background: #f9fafb;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      display: none;
      animation: fadeIn 0.3s ease-out;
    }

    .payment-details.active {
      display: block;
    }

    .details-header {
      font-weight: 900;
      color: #1f2937;
      margin-bottom: 1rem;
      font-size: 1rem;
    }

    .qr-code-container {
      background: white;
      padding: 1rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      text-align: center;
      border: 2px solid #e5e7eb;
    }

    .qr-code-container img {
      max-width: 100%;
      height: auto;
      border-radius: 0.5rem;
    }

    .payment-info {
      background: white;
      padding: 1rem;
      border-radius: 0.75rem;
      margin-bottom: 0.75rem;
      border-left: 4px solid #dc2626;
    }

    .info-label {
      font-size: 0.75rem;
      color: #6b7280;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .info-value {
      font-weight: 900;
      color: #1f2937;
      font-size: 1rem;
      word-break: break-all;
    }

    .copy-btn {
      background: #dc2626;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.875rem;
      transition: all 0.2s;
      margin-top: 0.75rem;
      width: 100%;
    }

    .copy-btn:hover {
      background: #b91c1c;
    }

    .copy-btn.copied {
      background: #16a34a;
    }

    .payment-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 1.5rem;
      background: #f9fafb;
      border-top: 2px solid #e5e7eb;
      border-radius: 0 0 1.5rem 1.5rem;
    }

    .btn-cancel {
      background: #e5e7eb;
      color: #1f2937;
      border: none;
      padding: 0.75rem;
      border-radius: 0.75rem;
      cursor: pointer;
      font-weight: 900;
      transition: all 0.2s;
    }

    .btn-cancel:hover {
      background: #d1d5db;
    }

    .btn-place-order {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 0.75rem;
      cursor: pointer;
      font-weight: 900;
      transition: all 0.2s;
      box-shadow: 0 10px 15px rgba(22, 163, 74, 0.3);
    }

    .btn-place-order:hover {
      background: linear-gradient(135deg, #15803d, #166534);
      transform: scale(1.02);
    }

    /* Confirmation Screen */
    .confirmation-screen {
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .confirmation-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: bounce 0.6s ease-out;
    }

    .confirmation-title {
      font-size: 1.5rem;
      font-weight: 900;
      color: #16a34a;
      margin-bottom: 0.5rem;
    }

    .confirmation-text {
      color: #6b7280;
      margin-bottom: 1.5rem;
    }

    .order-number {
      background: #f0fdf4;
      border: 2px solid #16a34a;
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }

    .order-number-label {
      font-size: 0.75rem;
      color: #6b7280;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .order-number-value {
      font-size: 1.25rem;
      font-weight: 900;
      color: #16a34a;
    }

    .btn-close {
      width: 100%;
      background: #dc2626;
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 0.75rem;
      cursor: pointer;
      font-weight: 900;
      transition: all 0.2s;
    }

    .btn-close:hover {
      background: #b91c1c;
    }

    /* Main Content */
    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    .category-section {
      padding: 1.5rem 1rem;
      overflow-x: auto;
    }

    .category-scroll {
      display: flex;
      gap: 0.75rem;
      width: fit-content;
      padding: 0.5rem 0;
    }

    @media (min-width: 768px) {
      .category-scroll {
        justify-content: center;
        flex-wrap: wrap;
        width: 100%;
      }
    }

    .category-btn {
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-weight: 700;
      white-space: nowrap;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .category-btn.active {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
      box-shadow: 0 10px 15px rgba(220, 38, 38, 0.3);
      transform: scale(1.05);
    }

    .category-btn:not(.active) {
      background: white;
      color: #dc2626;
      border: 2px solid #fcd5d5;
    }

    .category-btn:not(.active):hover {
      border-color: #dc2626;
    }

    .menu-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .menu-header h2 {
      font-size: clamp(1.5rem, 5vw, 1.875rem);
      font-weight: 900;
      color: #1f2937;
      margin: 0;
    }

    .category-name {
      color: #dc2626;
    }

    .menu-content {
      padding: 0 1rem 2rem;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
    }

    @media (min-width: 640px) {
      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
    }

    @media (min-width: 1024px) {
      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }
    }

    .menu-card {
      background: white;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      border: 2px solid #fef3c7;
      transition: all 0.2s;
    }

    .menu-card:hover {
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.1);
      transform: scale(1.05);
      border-color: #fca5a5;
    }

    .card-image {
      background: linear-gradient(135deg, #fee2e2, #fef3c7);
      padding: 1.5rem;
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 7rem;
    }

    .card-content {
      padding: 1rem;
    }

    .card-name {
      font-weight: 700;
      color: #1f2937;
      font-size: 0.875rem;
      line-height: 1.5;
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      height: 2.8rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.75rem;
    }

    .card-price {
      font-size: 1.125rem;
      font-weight: 900;
      color: #dc2626;
    }

    .add-btn {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #78350f;
      border: none;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 4px 6px rgba(251, 191, 36, 0.3);
    }

    .add-btn:hover {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      transform: scale(1.1);
    }

    .add-btn:active {
      transform: scale(0.95);
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }
      to {
        transform: translateY(0);
      }
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-content">
      <div class="logo">

      <button class="cart-btn" id="cartBtn">

      </button>
    </div>
  </header>

  <!-- Cart Modal -->
  <div class="modal-overlay" id="cartModal">
    <div class="cart-modal">
      <div class="modal-header">

  <!-- Payment Modal -->

    </div>

        details: { label: 'GCash Number', phone: '+63 948 773 5332', qrCodeUrl: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAABAAEDASIAAhEBAxEB/8QAFQABAQAAAAAAAAAAAAAAAAAAAAv/xAAUEAEAAAAAAAAAAAAAAAAAAAAA/8VAFQEBAQAAAAAAAAAAAAAAAAAAAAX/xAAUEQEAAAAAAAAAAAAAAAAAAAAA/9oADAMBAAIRAxEAPwCwAA8A/9k='}
      },
      {
        id: 'maya',
        name: 'Maya',
        icon: '💳',
        type: 'wallet',
        details: { label: 'Maya Phone Number', phone: '+63 948 773 5332', qrCodeUrl: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAABAAEDASIAAhEBAxEB/8QAFQABAQAAAAAAAAAAAAAAAAAAAAv/xAAUEAEAAAAAAAAAAAAAAAAAAAAA/8VAFQEBAQAAAAAAAAAAAAAAAAAAAAX/xAAUEQEAAAAAAAAAAAAAAAAAAAAA/9oADAMBAAIRAxEAPwCwAA8A/9k='}
      },
      {
        id: 'paypal',
        name: 'PayPal',
        icon: '🅿️',
        type: 'email',
        details: { label: 'PayPal Email', email: 'chinwhoooo@gmail.com', message: 'Send payment to the email address above' }
      }
    ];

    let cart = [];
    let activeCategory = 'Filipino';
    let selectedPaymentMethod = null;

    // DOM Elements
    const categoryScroll = document.getElementById('categoryScroll');
    const categoryTitle = document.getElementById('categoryTitle');
    const menuGrid = document.getElementById('menuGrid');
    const cartBtn = document.getElementById('cartBtn');
    const cartModal = document.getElementById('cartModal');
    const paymentModal = document.getElementById('paymentModal');
    const closeCart = document.getElementById('closeCart');
    const cartContent = document.getElementById('cartContent');
    const cartCount = document.getElementById('cartCount');
    const paymentMethods_el = document.getElementById('paymentMethods');
    const paymentDetails_el = document.getElementById('paymentDetails');
    const paymentAmount = document.getElementById('paymentAmount');
    const btnCancel = document.getElementById('btnCancel');
    const btnPlaceOrder = document.getElementById('btnPlaceOrder');

    // Initialize
    function init() {
      try {
        renderCategories();
        renderMenu();
        renderPaymentMethods();
        attachEventListeners();
        console.log('✅ App initialized successfully');
      } catch (error) {
        console.error('❌ Initialization error:', error);
      }
    }

    // Render Categories
    function renderCategories() {
      const categories = Object.keys(menuData);
      categoryScroll.innerHTML = categories.map(category => `
        <button class="category-btn ${category === activeCategory ? 'active' : ''}" data-category="${category}">
          ${category}
        </button>
      `).join('');

      categoryScroll.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategory = btn.dataset.category;
          document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          categoryTitle.textContent = activeCategory;
          renderMenu();
        });
      });
    }

    // Render Menu
    function renderMenu() {
      const items = menuData[activeCategory] || [];
      menuGrid.innerHTML = items.map((item, idx) => `
        <div class="menu-card">
          <div class="card-image">${item.img}</div>
          <div class="card-content">
            <h3 class="card-name">${item.name}</h3>
            <div class="card-footer">
              <span class="card-price">₱${item.price}</span>
              <button class="add-btn" data-id="${item.id}">➕</button>
            </div>
          </div>
        </div>
      `).join('');

      menuGrid.querySelectorAll('.add-btn').forEach(btn => {
        btn.addEventListener('click', () => addToCart(parseInt(btn.dataset.id)));
      });
    }

    // Add to Cart
    function addToCart(itemId) {
      for (let category of Object.keys(menuData)) {
        const item = menuData[category].find(i => i.id === itemId);
        if (item) {
          const cartItem = cart.find(c => c.id === itemId);
          if (cartItem) {
            cartItem.qty++;
          } else {
            cart.push({ ...item, qty: 1 });
          }
          updateCart();
          return;
        }
      }
    }

    // Render Payment Methods
    function renderPaymentMethods() {
      paymentMethods_el.innerHTML = paymentMethods.map(method => `
        <button class="payment-method-btn" data-method="${method.id}">
          <div class="payment-icon">${method.icon}</div>
          <div class="payment-label">${method.name}</div>
        </button>
      `).join('');

      paymentMethods_el.querySelectorAll('.payment-method-btn').forEach(btn => {
        btn.addEventListener('click', () => selectPaymentMethod(btn.dataset.method));
      });

      if (paymentMethods.length > 0) {
        selectPaymentMethod(paymentMethods[0].id);
      }
    }

    // Select Payment Method
    function selectPaymentMethod(methodId) {
      selectedPaymentMethod = methodId;
      document.querySelectorAll('.payment-method-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-method="${methodId}"]`).classList.add('active');

      const method = paymentMethods.find(m => m.id === methodId);
      if (method) {
        renderPaymentDetails(method);
      }
    }

    // Render Payment Details
    function renderPaymentDetails(method) {
      let detailsHTML = `<div class="details-header">${method.details.label}</div>`;

      if (method.type === 'cod') {
        detailsHTML += `<div class="payment-info"><p>${method.details.message}</p></div>`;
      } else if (method.type === 'wallet') {
        detailsHTML += `
          <div class="qr-code-container">
            <img src="${method.details.qrCodeUrl}" alt="${method.name} QR Code" style="max-width: 200px;">
          </div>
          <div class="payment-info">
            <div class="info-label">Phone Number</div>
            <div class="info-value">${method.details.phone}</div>
            <button class="copy-btn" onclick="copyToClipboard('${method.details.phone}', this)">📋 Copy Number</button>
          </div>
        `;
      } else if (method.type === 'email') {
        detailsHTML += `
          <div class="payment-info">
            <div class="info-label">PayPal Email</div>
            <div class="info-value">${method.details.email}</div>
            <button class="copy-btn" onclick="copyToClipboard('${method.details.email}', this)">📋 Copy Email</button>
          </div>
          <p style="margin-top: 1rem; color: #6b7280; font-size: 0.875rem;">${method.details.message}</p>
        `;
      }

      paymentDetails_el.innerHTML = detailsHTML;
      paymentDetails_el.classList.add('active');
    }

    // Copy to Clipboard
    window.copyToClipboard = function(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.textContent;
        btn.textContent = '✅ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = originalText;
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => alert('Copy failed'));
    };

    // Update Cart Display
    function updateCart() {
      cartCount.textContent = cart.length;
      cartCount.style.display = cart.length > 0 ? 'flex' : 'none';

      if (cart.length === 0) {
        cartContent.innerHTML = `
          <div class="cart-empty">
            <p>Your cart is empty</p>
            <p style="font-size: 0.875rem; margin-top: 0.5rem;">Start adding meals! 🍽️</p>
          </div>
        `;
      } else {
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        cartContent.innerHTML = `
          <div class="cart-items">
            ${cart.map(item => `
              <div class="cart-item">
                <div class="cart-item-info">
                  <div class="cart-item-name">${item.name}</div>
                  <div class="cart-item-price">₱${item.price}</div>
                </div>
                <div class="qty-control">
                  <button class="qty-btn minus" data-id="${item.id}">−</button>
                  <span class="qty-display">${item.qty}</span>
                  <button class="qty-btn plus" data-id="${item.id}">+</button>
                </div>
              </div>
            `).join('')}
          </div>
          <div class="cart-footer">
            <div class="cart-total">
              <span>Total:</span>
              <span class="cart-total-amount">₱${total}</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">Checkout Now</button>
          </div>
        `;

        document.querySelectorAll('.qty-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const itemId = parseInt(btn.dataset.id);
            const item = cart.find(c => c.id === itemId);
            if (btn.classList.contains('minus')) {
              item.qty--;
              if (item.qty <= 0) {
                cart = cart.filter(c => c.id !== itemId);
              }
            } else {
              item.qty++;
            }
            updateCart();
          });
        });

        document.getElementById('checkoutBtn').addEventListener('click', showPaymentModal);
      }
    }

    // Show Payment Modal
    function showPaymentModal() {
      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      paymentAmount.textContent = '₱' + total;
      cartModal.classList.remove('active');
      paymentModal.classList.add('active');
    }

    // Place Order
    function placeOrder() {
      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }

      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const orderNumber = 'ORD' + Date.now();
      const method = paymentMethods.find(m => m.id === selectedPaymentMethod);

      const paymentContent = document.querySelector('.payment-content');
      paymentContent.innerHTML = `
        <div class="confirmation-screen">
          <div class="confirmation-icon">✅</div>
          <h3 class="confirmation-title">Order Confirmed!</h3>
          <p class="confirmation-text">Your order has been successfully placed.</p>
          
          <div class="order-number">
            <div class="order-number-label">Order Number</div>
            <div class="order-number-value">${orderNumber}</div>
          </div>

          <div style="background: #f9fafb; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; text-align: left;">
            <p style="font-weight: 700; color: #1f2937; margin-bottom: 0.5rem;">Order Summary:</p>
            ${cart.map(item => `
              <p style="color: #6b7280; font-size: 0.875rem; margin: 0.25rem 0;">
                ${item.name} x${item.qty} = ₱${item.price * item.qty}
              </p>
            `).join('')}
            <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 0.75rem 0;">
            <p style="font-weight: 900; color: #dc2626; font-size: 1.125rem;">Total: ₱${total}</p>
          </div>

          <div style="background: #fef3c7; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; text-align: center;">
            <p style="font-weight: 700; color: #1f2937; margin-bottom: 0.5rem;">Payment Method:</p>
            <p style="font-size: 1.25rem;">${method.icon} ${method.name}</p>
          </div>

          <p style="color: #6b7280; font-size: 0.875rem;">
            ⏱️ Your order will be ready in <strong>30-45 minutes</strong>
          </p>
        </div>
      `;

      const paymentActions = document.querySelector('.payment-actions');
      paymentActions.innerHTML = `
        <button class="btn-close" style="grid-column: 1 / -1;" id="btnCloseConfirmation">Close</button>
      `;

      document.getElementById('btnCloseConfirmation').addEventListener('click', closePaymentModal);
    }

    // Close Payment Modal
    function closePaymentModal() {
      paymentModal.classList.remove('active');
      cart = [];
      updateCart();
      location.reload();
    }

    // Event Listeners
    function attachEventListeners() {
      cartBtn.addEventListener('click', () => {
        cartModal.classList.toggle('active');
      });

      closeCart.addEventListener('click', () => {
        cartModal.classList.remove('active');
      });

      cartModal.addEventListener('click', (e) => {
        if (e.target === cartModal) {
          cartModal.classList.remove('active');
        }
      });

      paymentModal.addEventListener('click', (e) => {
        if (e.target === paymentModal) {
          closePaymentModal();
        }
      });

      btnCancel.addEventListener('click', () => {
        paymentModal.classList.remove('active');
        cartModal.classList.add('active');
      });

      btnPlaceOrder.addEventListener('click', placeOrder);
    }

    // Start
    document.addEventListener('DOMContentLoaded', init);
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
