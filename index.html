      background: white;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);

      justify-content: space-between;

      font-weight: 900;
      color: #b91c1c;
      letter-spacing: -1px;
    }

    .logo p {

      color: #b45309;
      font-weight: 700;
      letter-spacing: 1px;
      margin-top: 2px;
    }

      background: #dc2626;
      color: white;
      border: none;
      border-radius: 9999px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 10px 15px rgba(220, 38, 38, 0.3);

      background: #b91c1c;
      transform: scale(1.05);
    }

    .cart-btn:active {
      transform: scale(0.95);
    }

      right: -0.5rem;
      background: #fbbf24;
      color: #7c2d12;
      font-weight: 700;
      font-size: 0.75rem;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;

      z-index: 50;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;

      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
      border: none;
      font-weight: 900;
      padding: 0.75rem;
      border-radius: 0.5rem;

      transition: all 0.2s;
      box-shadow: 0 10px 15px rgba(220, 38, 38, 0.3);

    .checkout-btn:hover {

    }

    .checkout-btn:active {

    .payment-method-btn:hover {

      padding: 1.5rem;

      background: #d1d5db;
    }

      border: none;
      padding: 0.75rem;

      cursor: pointer;
      font-weight: 900;
      transition: all 0.2s;
      box-shadow: 0 10px 15px rgba(22, 163, 74, 0.3);

    .btn-place-order:hover {

      transform: scale(1.02);
    }

    .confirmation-text {

      margin-bottom: 1.5rem;

    .btn-close {

      font-weight: 900;

    // State
    let cart = [];
    let activeCategory = 'Filipino';
    let selectedPaymentMethod = null;

    // DOM Elements
    const categoryScroll = document.getElementById('categoryScroll');
    const categoryTitle = document.getElementById('categoryTitle');
    const menuGrid = document.getElementById('menuGrid');
    const cartBtn = document.getElementById('cartBtn');
    const cartModal = document.getElementById('cartModal');
    const paymentModal = document.getElementById('paymentModal');
    const closeCart = document.getElementById('closeCart');
    const cartContent = document.getElementById('cartContent');
    const cartCount = document.getElementById('cartCount');
    const paymentMethods_el = document.getElementById('paymentMethods');
    const paymentDetails_el = document.getElementById('paymentDetails');
    const paymentAmount = document.getElementById('paymentAmount');
    const btnCancel = document.getElementById('btnCancel');
    const btnPlaceOrder = document.getElementById('btnPlaceOrder');

    // Initialize
    function init() {
      renderCategories();
      renderMenu();
      attachEventListeners();
      renderPaymentMethods();
    }

    // Render Categories
    function renderCategories() {
      categoryScroll.innerHTML = Object.keys(menuData).map(category => `
        <button class="category-btn ${category === activeCategory ? 'active' : ''}" data-category="${category}">
          ${category}
        </button>
      `).join('');

      categoryScroll.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategory = btn.dataset.category;
          document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          categoryTitle.textContent = activeCategory;
          renderMenu();
        });
      });
    }

    // Render Menu
    function renderMenu() {
      const items = menuData[activeCategory];
      menuGrid.innerHTML = items.map((item, idx) => `
        <div class="menu-card" style="animation-delay: ${idx * 30}ms">
          <div class="card-image">${item.img}</div>
          <div class="card-content">
            <h3 class="card-name">${item.name}</h3>
            <div class="card-footer">
              <span class="card-price">₱${item.price}</span>
              <button class="add-btn" data-id="${item.id}">➕</button>
            </div>
          </div>
        </div>
      `).join('');

      menuGrid.querySelectorAll('.add-btn').forEach(btn => {
        btn.addEventListener('click', () => addToCart(parseInt(btn.dataset.id)));
      });
    }

    // Add to Cart
    function addToCart(itemId) {
      let found = false;
      for (let category of Object.keys(menuData)) {
        const item = menuData[category].find(i => i.id === itemId);
        if (item) {
          const cartItem = cart.find(c => c.id === itemId);
          if (cartItem) {
            cartItem.qty++;
          } else {
            cart.push({ ...item, qty: 1 });
          }
          found = true;
          break;
        }
      }
      updateCart();
    }

    // Render Payment Methods
    function renderPaymentMethods() {
      paymentMethods_el.innerHTML = paymentMethods.map(method => `
        <button class="payment-method-btn" data-method="${method.id}">
          <div class="payment-icon">${method.icon}</div>
          <div class="payment-label">${method.name}</div>
        </button>
      `).join('');

      paymentMethods_el.querySelectorAll('.payment-method-btn').forEach(btn => {
        btn.addEventListener('click', () => selectPaymentMethod(btn.dataset.method));
      });

      // Default select first method
      if (paymentMethods.length > 0) {
        selectPaymentMethod(paymentMethods[0].id);
      }
    }

    // Select Payment Method
    function selectPaymentMethod(methodId) {
      selectedPaymentMethod = methodId;
      
      // Update active button
      document.querySelectorAll('.payment-method-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-method="${methodId}"]`).classList.add('active');

      // Show payment details
      const method = paymentMethods.find(m => m.id === methodId);
      if (method) {
        renderPaymentDetails(method);
      }
    }

    // Render Payment Details
    function renderPaymentDetails(method) {
      let detailsHTML = `<div class="details-header">${method.details.label}</div>`;

      if (method.type === 'cod') {
        detailsHTML += `
          <div class="payment-info">
            <p>${method.details.message}</p>
          </div>
        `;
      } else if (method.type === 'wallet') {
        detailsHTML += `
          <div class="qr-code-container">
            <img src="${method.details.qrCodeUrl}" alt="${method.name} QR Code" style="max-width: 200px; max-height: 200px;">
          </div>
          <div class="payment-info">
            <div class="info-label">Phone Number</div>
            <div class="info-value">${method.details.phone}</div>
            <button class="copy-btn" onclick="copyToClipboard('${method.details.phone}', this)">📋 Copy Number</button>
          </div>
        `;
      } else if (method.type === 'email') {
        detailsHTML += `
          <div class="payment-info">
            <div class="info-label">PayPal Email</div>
            <div class="info-value">${method.details.email}</div>
            <button class="copy-btn" onclick="copyToClipboard('${method.details.email}', this)">📋 Copy Email</button>
          </div>
          <p style="margin-top: 1rem; color: #6b7280; font-size: 0.875rem;">${method.details.message}</p>
        `;
      }

      paymentDetails_el.innerHTML = detailsHTML;
      paymentDetails_el.classList.add('active');
    }

    // Copy to Clipboard
    window.copyToClipboard = function(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.textContent;
        btn.textContent = '✅ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    };

    // Update Cart Display
    function updateCart() {
      cartCount.textContent = cart.length;
      cartCount.style.display = cart.length > 0 ? 'flex' : 'none';

      if (cart.length === 0) {
        cartContent.innerHTML = `
          <div class="cart-empty">
            <p>Your cart is empty</p>
            <p class="small">Start adding meals! 🍽️</p>
          </div>
        `;
      } else {
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        cartContent.innerHTML = `
          <div class="cart-items">
            ${cart.map(item => `
              <div class="cart-item">
                <div class="cart-item-info">
                  <div class="cart-item-name">${item.name}</div>
                  <div class="cart-item-price">₱${item.price}</div>
                </div>
                <div class="qty-control">
                  <button class="qty-btn minus" data-id="${item.id}">−</button>
                  <span class="qty-display">${item.qty}</span>
                  <button class="qty-btn plus" data-id="${item.id}">+</button>
                </div>
              </div>
            `).join('')}
          </div>
          <div class="cart-footer">
            <div class="cart-total">
              <span>Total:</span>
              <span class="cart-total-amount">₱${total}</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">Checkout Now</button>
          </div>
        `;

        // Attach qty button listeners
        cartContent.querySelectorAll('.qty-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const itemId = parseInt(btn.dataset.id);
            const item = cart.find(c => c.id === itemId);
            if (btn.classList.contains('minus')) {
              item.qty--;
              if (item.qty <= 0) {
                cart = cart.filter(c => c.id !== itemId);
              }
            } else {
              item.qty++;
            }
            updateCart();
          });
        });

        // Checkout button listener
        document.getElementById('checkoutBtn').addEventListener('click', showPaymentModal);
      }
    }

    // Show Payment Modal
    function showPaymentModal() {
      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      paymentAmount.textContent = '₱' + total;
      cartModal.classList.remove('active');
      paymentModal.classList.add('active');
    }

    // Place Order
    function placeOrder() {
      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }

      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const orderNumber = 'ORD' + Date.now();
      const method = paymentMethods.find(m => m.id === selectedPaymentMethod);

      // Show confirmation
      const paymentContent = document.querySelector('.payment-content');
      paymentContent.innerHTML = `
        <div class="confirmation-screen">
          <div class="confirmation-icon">✅</div>
          <h3 class="confirmation-title">Order Confirmed!</h3>
          <p class="confirmation-text">Your order has been successfully placed.</p>
          
          <div class="order-number">
            <div class="order-number-label">Order Number</div>
            <div class="order-number-value">${orderNumber}</div>
          </div>

          <div style="background: #f9fafb; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; text-align: left;">
            <p style="font-weight: 700; color: #1f2937; margin-bottom: 0.5rem;">Order Summary:</p>
            ${cart.map(item => `
              <p style="color: #6b7280; font-size: 0.875rem; margin: 0.25rem 0;">
                ${item.name} x${item.qty} = ₱${item.price * item.qty}
              </p>
            `).join('')}
            <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 0.75rem 0;">
            <p style="font-weight: 900; color: #dc2626; font-size: 1.125rem;">Total: ₱${total}</p>
          </div>

          <div style="background: #fef3c7; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; text-align: center;">
            <p style="font-weight: 700; color: #1f2937; margin-bottom: 0.5rem;">Payment Method:</p>
            <p style="font-size: 1.25rem;">${method.icon} ${method.name}</p>
          </div>

          <p style="color: #6b7280; font-size: 0.875rem; margin-bottom: 1.5rem;">
            ⏱️ Your order will be ready in <strong>30-45 minutes</strong>
          </p>
        </div>
      `;

      // Update button container
      const paymentActions = document.querySelector('.payment-actions');
      paymentActions.innerHTML = `
        <button class="btn-close" style="grid-column: 1 / -1;" id="btnCloseConfirmation">Close</button>
      `;

      document.getElementById('btnCloseConfirmation').addEventListener('click', closePaymentModal);
    }

    // Close Payment Modal
    function closePaymentModal() {
      paymentModal.classList.remove('active');
      cart = [];
      updateCart();
      location.reload(); // Optional: refresh to show fresh menu
    }

    // Event Listeners
    function attachEventListeners() {
      cartBtn.addEventListener('click', () => {
        cartModal.classList.toggle('active');
      });

      closeCart.addEventListener('click', () => {
        cartModal.classList.remove('active');
      });

      cartModal.addEventListener('click', (e) => {
        if (e.target === cartModal) {
          cartModal.classList.remove('active');
        }
      });

      paymentModal.addEventListener('click', (e) => {
        if (e.target === paymentModal) {
          closePaymentModal();
        }
      });

      btnCancel.addEventListener('click', () => {
        paymentModal.classList.remove('active');
        cartModal.classList.add('active');
      });

      btnPlaceOrder.addEventListener('click', placeOrder);
    }

    // Start
    init();
  </script>
</body>
</html>
